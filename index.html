<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ذہین ساتھی</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="font-family:Arial;text-align:center;padding:50px;background:#f5f5f5;">

<h1>🤖 ذہین ساتھی</h1>
<p>AI اسسٹنٹ میں خوش آمدید!</p>

<button id="signin">Pi سے Sign In کریں</button>

<p id="status"></p>

<script>
Pi.init({
  version: "2.0",
  sandbox: true
});

async function login() {
  try {
    document.getElementById("status").innerText = "Connecting...";

    const auth = await Pi.authenticate(
      ["username"],
      function(incompletePayment) {
        console.log("Incomplete Payment:", incompletePayment);
      }
    );

    // Backend پر Access Token Verify کریں
    const response = await fetch("/api/auth", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        accessToken: auth.accessToken
      })
    });

    const data = await response.json();

    if (data.success) {
      document.getElementById("status").innerHTML =
        "✅ Welcome <b>" + data.user.username + "</b>";
    } else {
      document.getElementById("status").innerText =
        "Login verification failed";
    }

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText =
      "❌ Login Failed";
  }
}

document
  .getElementById("signin")
  .addEventListener("click", login);
</script>

</body>
</html>
